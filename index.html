<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no"
    />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="theme-color" content="#101014" />
    <link rel="apple-touch-icon" href="./icons/apple-touch-icon.png" />
    <title>Panglossa</title>
    <script>
      // set theme before first paint to avoid a flash (corrected later from settings).
      // also match theme-color to the app bg so the iOS status bar / Safari toolbar
      // don't render as dark bands over a light app.
      try {
        var m = matchMedia('(prefers-color-scheme: dark)').matches
        document.documentElement.dataset.theme = m ? 'dark' : 'light'
        var mc = document.querySelector('meta[name="theme-color"]')
        if (mc) mc.setAttribute('content', m ? '#0b0b0c' : '#e8e6ee')
      } catch (e) {
        document.documentElement.dataset.theme = 'dark'
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
